# ── Production profile ──
# Sumopod Ubuntu VPS — set secrets via environment variables, never hardcode them

# Behind Caddy (TLS terminates at the proxy, app speaks plain HTTP on :8080).
# Honor X-Forwarded-Proto/Host so Spring builds correct https:// absolute URLs.
server:
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${DB_URL}   # Neon.tech JDBC URL e.g. jdbc:postgresql://ep-xxx.neon.tech/lolita_laundry?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    # Adds the prod-only data seed (R__prod_price_seed.sql: item catalogue + per-client unit prices)
    # on top of the real migrations. The seed file is commercially sensitive and is NOT committed —
    # it is generated locally and SCP'd onto the VPS into PROD_SEED_DIR, then read from the
    # filesystem (not the JAR classpath). Missing dir is ignored (fail-on-missing-locations=false),
    # so the app still boots if the file hasn't been copied yet. Dev uses classpath:db/seed; tests
    # use neither — this filesystem location only applies under the prod profile.
    locations: classpath:db/migration,filesystem:${PROD_SEED_DIR:/opt/lolita-laundry/prod-seed}

spring.security.oauth2.resourceserver.jwt:
  issuer-uri: https://dev-orcxwn2q35kltpyb.us.auth0.com/
  # The API identifier you set in Auth0 (Applications → APIs → Identifier).
  # Spring validates the JWT 'aud' claim against this. Set AUTH0_AUDIENCE on the VM.
  audiences: ${AUTH0_AUDIENCE}

# Cloudflare R2
app:
  storage:
    endpoint: https://2a48f3351e414c179868bf5ef6ca0a50.r2.cloudflarestorage.com
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    bucket: lolita-laundry
    region: auto
    path-style-access: true
