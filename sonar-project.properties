# SonarQube Cloud — analysis configuration (Automatic Analysis).
#
# This project uses SonarCloud Automatic Analysis (the GitHub App), not a CI scanner.
# Automatic Analysis CANNOT import test coverage (JaCoCo/Vitest) — coverage is intentionally
# not configured here. Assign a custom Quality Gate (copy of "Sonar way" with the
# "Coverage on New Code" condition removed) to this project in the SonarCloud UI.
#
# NOTE: depending on your SonarCloud tenant, Automatic Analysis may read these exclusions from
# this file OR only from the UI (Project > Administration > Analysis Scope). Mirror them in the
# UI to be safe — that path is always honored.

sonar.projectKey=salmanoe_lolita-laundry
sonar.organization=salmanoe

# ── Source roots (monorepo: Java backend + TS/React frontend) ──
sonar.sources=backend/src/main,frontend/src
sonar.tests=backend/src/test

# ── Exclusions: vendored, generated, and immutable seed/migration content ──
sonar.exclusions=\
  frontend/node_modules/**,\
  frontend/dist/**,\
  backend/build/**,\
  backend/.gradle/**,\
  backend/src/main/resources/db/migration/**,\
  backend/src/main/resources/db/seed/**,\
  backend/src/main/resources/pdf/**

# Flyway SQL migrations are append-only history — never flag them as "new code" smells.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=*
sonar.issue.ignore.multicriteria.e1.resourceKey=**/db/migration/**
