services:

  postgres:
    image: postgres:17-alpine
    container_name: lolita-postgres
    environment:
      POSTGRES_DB: lolita_laundry
      POSTGRES_USER: lolita
      POSTGRES_PASSWORD: lolita_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lolita -d lolita_laundry"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lolita-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API (used by Spring Boot)
      - "9001:9001"   # MinIO web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket init — runs once, creates the app bucket
  minio-init:
    image: minio/mc:latest
    container_name: lolita-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/lolita-laundry;
      mc anonymous set download local/lolita-laundry/public;
      exit 0;
      "
    restart: "no"

volumes:
  postgres_data:
  minio_data:
