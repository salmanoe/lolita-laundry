name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # --ignore-scripts blocks dependency lifecycle scripts (postinstall etc.) from running
      # during install — a compromised transitive package can't execute code in CI. Safe here:
      # esbuild's native binary ships as a platform optionalDependency, not a postinstall script.
      - run: npm ci --ignore-scripts
      - run: npm run build